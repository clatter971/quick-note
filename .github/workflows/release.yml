name: Release Portable Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build from'
        required: false
        default: 'master'

permissions:
  contents: write

jobs:
  build-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python build deps
        run: pip install --upgrade pip pyinstaller watchdog

      - name: Download AutoHotkey v2
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP\ahk-v2.zip"
          Invoke-WebRequest -Uri 'https://www.autohotkey.com/download/ahk-v2.zip' -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\ahk-v2"
          $exe = (Get-ChildItem "$env:RUNNER_TEMP\ahk-v2" -Recurse -Filter 'AutoHotkey64.exe' | Select-Object -First 1).FullName
          if (-not $exe) { throw 'AutoHotkey64.exe not found in downloaded zip' }
          "AHK_EXE=$exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build frozen helpers
        shell: pwsh
        run: |
          $dist = "$env:GITHUB_WORKSPACE\dist\_pyinstaller\dist"
          $work = "$env:GITHUB_WORKSPACE\dist\_pyinstaller\work"
          $spec = "$env:GITHUB_WORKSPACE\dist\_pyinstaller"
          New-Item -ItemType Directory -Path $spec -Force | Out-Null
          foreach ($script in 'note_capture.py','note_watcher.py','claude_launcher.py') {
            pyinstaller --onefile --clean --noconfirm `
              --distpath $dist --workpath $work --specpath $spec $script
            if ($LASTEXITCODE -ne 0) { throw "PyInstaller failed on $script" }
          }

      - name: Assemble portable folder
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          $out = "$env:GITHUB_WORKSPACE\dist\quick-note-portable"
          New-Item -ItemType Directory -Path $out -Force | Out-Null
          New-Item -ItemType Directory -Path "$out\local" -Force | Out-Null
          Copy-Item $env:AHK_EXE "$out\quick-note.exe"
          foreach ($exe in 'note_capture.exe','note_watcher.exe','claude_launcher.exe') {
            Copy-Item "$env:GITHUB_WORKSPACE\dist\_pyinstaller\dist\$exe" "$out\$exe"
          }
          foreach ($f in 'quick-note.ahk','popup.html','quick-note-config.example.json','LICENSE','VERSION','README.md') {
            Copy-Item "$env:GITHUB_WORKSPACE\$f" "$out\$f"
          }
          Copy-Item "$env:GITHUB_WORKSPACE\docs\README-portable.txt" "$out\README-portable.txt"

      - name: Zip portable folder
        shell: pwsh
        run: |
          $zip = "$env:GITHUB_WORKSPACE\dist\quick-note-portable-$env:VERSION.zip"
          Compress-Archive -Path "$env:GITHUB_WORKSPACE\dist\quick-note-portable\*" -DestinationPath $zip
          "ARTIFACT_PATH=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v4
        with:
          name: quick-note-portable-${{ env.VERSION }}
          path: ${{ env.ARTIFACT_PATH }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_PATH }}
          generate_release_notes: true
